<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gong Timer" />
  <meta name="theme-color" content="#1a1612" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Gong Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1612;
      --surface: #221e19;
      --rim: #3a3028;
      --gold: #c8a96e;
      --gold-dim: #8a6e42;
      --text: #f0e8d8;
      --text-muted: #7a6e5e;
      --over: #d4826a;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      padding-top: max(env(safe-area-inset-top), 1.5rem);
      padding-bottom: max(env(safe-area-inset-bottom), 1.5rem);
      gap: 0;
    }

    /* Subtle background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 30%, #2a2218 0%, var(--bg) 70%);
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 360px;
      padding: 0 2rem;
      gap: 2.5rem;
    }

    /* ---- title ---- */
    .title {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: .25em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }

    /* ---- gong ring ---- */
    .gong-ring {
      position: relative;
      width: 220px;
      height: 220px;
      flex-shrink: 0;
    }

    .ring-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      transform: rotate(-90deg);
    }

    .ring-track {
      fill: none;
      stroke: var(--rim);
      stroke-width: 3;
    }

    .ring-progress {
      fill: none;
      stroke: var(--gold);
      stroke-width: 3;
      stroke-linecap: round;
      transition: stroke-dashoffset .9s linear, stroke .4s ease;
    }

    .ring-progress.overtime {
      stroke: var(--over);
    }

    .ring-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .time-display {
      font-family: 'DM Mono', monospace;
      font-weight: 300;
      font-size: 52px;
      letter-spacing: -.01em;
      color: var(--text);
      line-height: 1;
      transition: color .4s ease;
    }

    .time-display.over {
      color: var(--over);
    }

    .mode-label {
      font-size: 10px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--text-muted);
      min-height: 14px;
    }

    /* ---- over counter ---- */
    .over-count {
      font-size: 13px;
      color: var(--over);
      letter-spacing: .1em;
      min-height: 18px;
      font-family: 'DM Mono', monospace;
    }

    /* ---- input panel ---- */
    .inputs {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .spin-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .spin-label {
      font-size: 10px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .spin-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .spin-btn {
      background: none;
      border: none;
      color: var(--gold-dim);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      padding: 4px 12px;
      transition: color .15s;
    }
    .spin-btn:active { color: var(--gold); }

    .spin-val {
      font-family: 'DM Mono', monospace;
      font-size: 36px;
      font-weight: 300;
      color: var(--text);
      width: 72px;
      text-align: center;
      background: var(--surface);
      border: 1px solid var(--rim);
      border-radius: 8px;
      padding: 8px 0;
    }

    .colon {
      font-size: 36px;
      font-weight: 300;
      color: var(--text-muted);
      padding-bottom: 4px;
    }

    /* ---- buttons ---- */
    .btn-row {
      display: flex;
      gap: 12px;
      width: 100%;
    }

    .btn {
      flex: 1;
      padding: 14px 0;
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      letter-spacing: .1em;
      cursor: pointer;
      border: 1px solid var(--rim);
      background: var(--surface);
      color: var(--text-muted);
      transition: background .15s, color .15s, border-color .15s;
    }

    .btn.primary {
      background: var(--gold);
      border-color: var(--gold);
      color: #1a1612;
      font-weight: 400;
    }

    .btn:active { opacity: .75; }

    /* ---- panel visibility ---- */
    .panel { width: 100%; }
    .hidden { display: none !important; }

    /* ---- ripple on gong hit ---- */
    @keyframes ripple {
      0% { transform: scale(1); opacity: .6; }
      100% { transform: scale(1.35); opacity: 0; }
    }

    .ripple-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--gold);
      animation: ripple 1.2s ease-out forwards;
      pointer-events: none;
    }

    @keyframes gong-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .4; }
    }
    .pulsing .time-display {
      animation: gong-pulse .6s ease-in-out 3;
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="title">Gong Timer</div>

  <!-- ring display -->
  <div class="gong-ring" id="gong-ring">
    <svg class="ring-svg" viewBox="0 0 220 220">
      <circle class="ring-track" cx="110" cy="110" r="100" />
      <circle class="ring-progress" id="ring-arc" cx="110" cy="110" r="100"
        stroke-dasharray="628.3" stroke-dashoffset="0" />
    </svg>
    <div class="ring-center" id="ring-center">
      <div class="time-display" id="time-display">00:00</div>
      <div class="mode-label" id="mode-label"></div>
    </div>
  </div>

  <div class="over-count" id="over-count"></div>

  <!-- setup panel -->
  <div class="panel" id="setup-panel">
    <div class="inputs">
      <div class="spin-col">
        <div class="spin-label">min</div>
        <div class="spin-wrap">
          <button class="spin-btn" onclick="nudge('min',1)">▲</button>
          <div class="spin-val" id="min-val">05</div>
          <button class="spin-btn" onclick="nudge('min',-1)">▼</button>
        </div>
      </div>
      <div class="colon">:</div>
      <div class="spin-col">
        <div class="spin-label">sec</div>
        <div class="spin-wrap">
          <button class="spin-btn" onclick="nudge('sec',1)">▲</button>
          <div class="spin-val" id="sec-val">00</div>
          <button class="spin-btn" onclick="nudge('sec',-1)">▼</button>
        </div>
      </div>
    </div>
  </div>

  <!-- action buttons -->
  <div class="btn-row">
    <button class="btn primary hidden" id="reset-btn" onclick="resetTimer()">Reset</button>
    <button class="btn primary" id="start-btn" onclick="startTimer()">Start</button>
  </div>
</div>

<script>
  let mins = 5, secs = 0;
  let totalSeconds = 0, elapsed = 0;
  let phase = 'setup';
  let interval = null;
  let audioCtx = null;

  const CIRCUMFERENCE = 2 * Math.PI * 100;

  const arc = document.getElementById('ring-arc');
  const timeDisplay = document.getElementById('time-display');
  const modeLabel = document.getElementById('mode-label');
  const overCount = document.getElementById('over-count');
  const setupPanel = document.getElementById('setup-panel');
  const startBtn = document.getElementById('start-btn');
  const resetBtn = document.getElementById('reset-btn');
  const gongRing = document.getElementById('gong-ring');

  function pad(n) { return String(n).padStart(2, '0'); }
  function fmt(s) {
    const m = Math.floor(Math.abs(s) / 60);
    const sc = Math.abs(s) % 60;
    return pad(m) + ':' + pad(sc);
  }

  function nudge(field, dir) {
    if (field === 'min') {
      mins = (mins + dir + 100) % 100;
      document.getElementById('min-val').textContent = pad(mins);
    } else {
      secs = (secs + dir + 60) % 60;
      document.getElementById('sec-val').textContent = pad(secs);
    }
    updateRingIdle();
    timeDisplay.textContent = fmt(mins * 60 + secs);
  }

  function updateRingIdle() {
    arc.style.strokeDashoffset = 0;
    arc.classList.remove('overtime');
  }

  function setRingProgress(fraction) {
    // fraction 1 = full, 0 = empty
    const offset = CIRCUMFERENCE * (1 - Math.max(0, Math.min(1, fraction)));
    arc.style.transition = 'stroke-dashoffset .9s linear';
    arc.style.strokeDashoffset = offset;
  }

  function playGong() {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const ctx = audioCtx;
      const now = ctx.currentTime;

      // Gong = fundamental + harmonics with long metallic decay
      const partials = [
        { freq: 110,  gain: 0.5,  decay: 4.0 },
        { freq: 220,  gain: 0.35, decay: 3.0 },
        { freq: 349,  gain: 0.25, decay: 2.2 },
        { freq: 523,  gain: 0.18, decay: 1.6 },
        { freq: 880,  gain: 0.10, decay: 0.9 },
        { freq: 1320, gain: 0.06, decay: 0.5 },
      ];

      partials.forEach(({ freq, gain, decay }) => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(gain, now);
        g.gain.setValueAtTime(gain, now + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, now + decay);
        osc.start(now);
        osc.stop(now + decay);
      });

      // Short attack transient (the "strike")
      const noise = ctx.createOscillator();
      const noiseGain = ctx.createGain();
      noise.connect(noiseGain); noiseGain.connect(ctx.destination);
      noise.type = 'sawtooth';
      noise.frequency.value = 80;
      noiseGain.gain.setValueAtTime(0.3, now);
      noiseGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
      noise.start(now); noise.stop(now + 0.08);
    } catch(e) {}
  }

  function startTimer() {
    totalSeconds = mins * 60 + secs;
    if (totalSeconds <= 0) return;
    elapsed = 0;
    phase = 'countdown';

    setupPanel.classList.add('hidden');
    startBtn.classList.add('hidden');
    resetBtn.classList.remove('hidden');
    modeLabel.textContent = 'counting down';
    overCount.textContent = '';
    timeDisplay.classList.remove('over');
    arc.classList.remove('overtime');
    arc.style.transition = 'none';
    arc.style.strokeDashoffset = 0;

    timeDisplay.textContent = fmt(totalSeconds);
    setRingProgress(1);

    interval = setInterval(tick, 1000);
  }

  function tick() {
    elapsed++;
    const remaining = totalSeconds - elapsed;

    if (remaining > 0) {
      timeDisplay.textContent = fmt(remaining);
      setRingProgress(remaining / totalSeconds);
    } else if (remaining === 0) {
      // Gong moment
      playGong();
      timeDisplay.textContent = '00:00';
      arc.style.transition = 'none';
      arc.style.strokeDashoffset = CIRCUMFERENCE;
      modeLabel.textContent = 'time\'s up';
      overCount.textContent = '+00:00';

      // Ripple effect
      const ripple = document.createElement('div');
      ripple.className = 'ripple-ring';
      gongRing.appendChild(ripple);
      setTimeout(() => ripple.remove(), 1300);

      // Pulse the display
      gongRing.classList.add('pulsing');
      setTimeout(() => gongRing.classList.remove('pulsing'), 2000);

      phase = 'stopwatch';
      setTimeout(() => {
        modeLabel.textContent = 'counting up';
        arc.classList.add('overtime');
        timeDisplay.classList.add('over');
      }, 800);
    } else {
      // Overtime count-up
      const over = elapsed - totalSeconds;
      overCount.textContent = '+' + fmt(over);
      // Ring slowly fills back up (over 5 min max visual)
      const overfrac = Math.min(over / 300, 1);
      arc.style.transition = 'stroke-dashoffset .9s linear';
      arc.style.strokeDashoffset = CIRCUMFERENCE * (1 - overfrac);
    }
  }

  function resetTimer() {
    clearInterval(interval);
    interval = null;
    phase = 'setup';
    elapsed = 0;

    setupPanel.classList.remove('hidden');
    startBtn.classList.remove('hidden');
    resetBtn.classList.add('hidden');

    timeDisplay.textContent = fmt(mins * 60 + secs);
    timeDisplay.classList.remove('over');
    modeLabel.textContent = '';
    overCount.textContent = '';
    arc.style.transition = 'none';
    arc.style.strokeDashoffset = 0;
    arc.classList.remove('overtime');
  }

  // Init display
  timeDisplay.textContent = fmt(mins * 60 + secs);

  // Register service worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
